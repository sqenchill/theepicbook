---
- name: Install Nginx
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Remove default Nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Deploy EpicBook Nginx reverse proxy config
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/epicbook
    mode: '0644'
  notify: Reload Nginx

- name: Enable EpicBook site
  file:
    src: /etc/nginx/sites-available/epicbook
    dest: /etc/nginx/sites-enabled/epicbook
    state: link
  notify: Reload Nginx

- name: Ensure Nginx is started and enabled
  systemd:
    name: nginx
    state: started
    enabled: yes

- name: Test Nginx configuration
  command: nginx -t
  changed_when: false
