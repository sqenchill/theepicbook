# This file is overwritten at runtime by the App Pipeline.
# Fill in these IPs manually when running Ansible locally
# (copy them from the Infra Pipeline "Terraform Outputs" step).

[frontend]
FRONTEND_PUBLIC_IP ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/epicbook-azure-key ansible_ssh_common_args='-o StrictHostKeyChecking=no'

[backend]
BACKEND_PUBLIC_IP ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/epicbook-azure-key ansible_ssh_common_args='-o StrictHostKeyChecking=no'
