trigger:
- main

parameters:
- name: APP_PUBLIC_IP
  displayName: "Frontend VM Public IP (from Infra pipeline outputs)"
  type: string
- name: BACKEND_PUBLIC_IP
  displayName: "Backend VM Public IP (from Infra pipeline outputs)"
  type: string
- name: BACKEND_PRIVATE_IP
  displayName: "Backend VM Private IP (from Infra pipeline outputs)"
  type: string
- name: MYSQL_FQDN
  displayName: "MySQL FQDN (from Infra pipeline outputs)"
  type: string

jobs:
- job: DeployEpicBook
  displayName: "Configure and Deploy EpicBook with Ansible"
  timeoutInMinutes: 90

  pool:
    name: Default

  steps:
  - checkout: self

  - script: |
      echo "=== Installing Ansible ==="
      if command -v ansible &>/dev/null; then
        ansible --version | head -1 | xargs echo "Ansible already installed:"
      else
        sudo apt-get update -y
        sudo apt-get install -y ansible
      fi
      ansible --version
    displayName: "Install Ansible"

  - task: DownloadSecureFile@1
    name: sshKey
    displayName: "Download SSH Private Key"
    inputs:
      secureFile: 'epicbook-azure-key'

  - script: |
      mkdir -p ~/.ssh
      cp $(sshKey.secureFilePath) ~/.ssh/epicbook-azure-key
      chmod 600 ~/.ssh/epicbook-azure-key
      echo "SSH key placed at ~/.ssh/epicbook-azure-key"
    displayName: "Configure SSH Key"

  - script: |
      cat > $(System.DefaultWorkingDirectory)/ansible/inventory/hosts.ini <<HOSTSEOF
      [frontend]
      ${{ parameters.APP_PUBLIC_IP }} ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/epicbook-azure-key ansible_ssh_common_args='-o StrictHostKeyChecking=no'

      [backend]
      ${{ parameters.BACKEND_PUBLIC_IP }} ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/epicbook-azure-key ansible_ssh_common_args='-o StrictHostKeyChecking=no'
      HOSTSEOF
      sed -i 's/^      //' $(System.DefaultWorkingDirectory)/ansible/inventory/hosts.ini
      echo "=== Ansible Inventory ==="
      cat $(System.DefaultWorkingDirectory)/ansible/inventory/hosts.ini
    displayName: "Build Ansible Inventory"

  - script: |
      cd $(System.DefaultWorkingDirectory)/ansible
      export ANSIBLE_HOST_KEY_CHECKING=False
      export ANSIBLE_ROLES_PATH=$(System.DefaultWorkingDirectory)/ansible/roles
      ansible-playbook \
        -i inventory/hosts.ini \
        playbooks/site.yml \
        -e "mysql_host=${{ parameters.MYSQL_FQDN }}" \
        -e "mysql_user=epicadmin" \
        -e "mysql_password=UseAStrongPassword123!" \
        -e "mysql_db=bookstore" \
        -e "backend_private_ip=${{ parameters.BACKEND_PRIVATE_IP }}" \
        -v
    displayName: "Run Ansible Playbooks"

  - script: |
      echo "=== Waiting 30s for app to fully start ==="
      sleep 30
      HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 http://${{ parameters.APP_PUBLIC_IP }} || echo "000")
      echo "HTTP response code: $HTTP_CODE"
      if [ "$HTTP_CODE" = "200" ]; then
        echo "SUCCESS: EpicBook is running at http://${{ parameters.APP_PUBLIC_IP }}"
      else
        echo "WARNING: Got HTTP $HTTP_CODE — check Nginx and Node.js service on the VMs"
        exit 1
      fi
    displayName: "Verify EpicBook Deployment"
